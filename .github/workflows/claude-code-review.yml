name: Claude Code Review

on:
    pull_request_target:
        types: [labeled]

concurrency:
    group: claude-review-${{ github.event.pull_request.number }}
    cancel-in-progress: false

jobs:
    gate:
        if: |
            github.event.label.name == 'claude-review' &&
            github.event.pull_request.draft == false &&
            !endsWith(github.event.pull_request.user.login, '[bot]')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        outputs:
            ok: ${{ steps.check.outputs.ok }}
        steps:
            - name: Check labeler permission
              id: check
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SENDER: ${{ github.event.sender.login }}
                  REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail
                  # `collaborators/{user}/permission` returns 404 when the user has no
                  # relationship to the repo. Normalise that to "none" so the deny
                  # branch always has a usable string. Effective permission resolves
                  # team-derived grants server-side.
                  perm=$(gh api "repos/$REPO/collaborators/$SENDER/permission" --jq '.permission' 2>/dev/null || echo none)
                  case "$perm" in
                      admin|maintain|write) ok=true ;;
                      *)                    ok=false ;;
                  esac
                  echo "labeler=$SENDER permission=$perm ok=$ok"
                  echo "ok=$ok" >> "$GITHUB_OUTPUT"

            - name: Deny + cleanup when labeler lacks Write
              if: steps.check.outputs.ok != 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  REPO: ${{ github.repository }}
                  SENDER: ${{ github.event.sender.login }}
              run: |
                  gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "claude-review" || true
                  gh pr comment "$PR_NUMBER" --repo "$REPO" --body "<!-- orderful-claude-review-denied -->
                  🚨 Claude Code review was denied. @$SENDER has insufficient repo access. The label has been removed."

    review:
        needs: gate
        if: needs.gate.outputs.ok == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            pull-requests: write
            id-token: write

        steps:
            - name: Remove review label (idempotent re-trigger)
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  REPO: ${{ github.repository }}
              run: gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "claude-review" || true

            - name: Checkout base (trusted)
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Checkout PR head into subdirectory (untrusted)
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  fetch-depth: 0
                  path: pr-head
                  persist-credentials: false

            - name: Strip PR-controlled Claude config from pr-head
              run: |
                  set -euo pipefail
                  # Fail closed if the PR pre-staged a quarantine path. Defends against
                  # the precreated-destination nesting trick and `mv`-follows-symlink
                  # attacks that the previous rename-based step was vulnerable to.
                  if [ -e pr-head/.claude.pr-untrusted ]; then
                    echo "::error::pr-head contains a pre-existing .claude.pr-untrusted path"
                    exit 1
                  fi
                  # Hard-delete every PR-controlled auto-discovery path under pr-head:
                  # top-level and nested .claude/, .claude.local/, CLAUDE.md, CLAUDE.local.md.
                  # find without -L does not traverse symlinks; -depth removes children
                  # before parents so symlinked-out targets aren't followed.
                  find pr-head -depth \
                    \( -name '.claude' -o -name '.claude.local' -o -name 'CLAUDE.md' -o -name 'CLAUDE.local.md' \) \
                    -exec rm -rf -- {} +
                  echo "Stripped all PR-controlled Claude config paths from pr-head."

            - name: Run Claude Code Review
              uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464 # v1.0.159
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  REPO: ${{ github.repository }}
                  PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
              with:
                  claude_code_oauth_token: ${{ secrets.ORDERFUL_BOT_CLAUDE_CODE_OAUTH_TOKEN }}
                  # Bypass the Anthropic OIDC exchange, which 401s on
                  # pull_request_target events. See anthropics/claude-code-action#713.
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  use_sticky_comment: true
                  include_fix_links: false
                  prompt: |
                      Invoke Skill(code-review) with args "--pr ${{ github.event.pull_request.number }} --comment".
                  claude_args: |
                      --max-turns 50
                      --model opus[1m]
                      --fallback-model sonnet
                      --effort medium
                      --add-dir pr-head
                      --allowedTools "Read,Write,Edit,Glob,Grep,Task,Bash(gh pr view:*),Bash(gh api:*),Bash(jq:*),Bash(gh pr comment:*),Bash(gh pr review:*)"

            - name: Post failure notice
              if: failure() || cancelled()
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  REPO: ${{ github.repository }}
                  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              run: |
                  gh pr comment "$PR_NUMBER" --repo "$REPO" --body "<!-- orderful-claude-review-failure -->
                  Automated Claude review did not complete. See [run logs]($RUN_URL). Re-apply the \`claude-review\` label to retry."
